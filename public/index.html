<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이벤트 링크</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 20px;
        line-height: 1.6;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }

      th,
      td {
        padding: 6px;
        text-align: left;
        border: 1px solid #ddd;
      }

      th {
        background-color: #f5f5f5;
        font-weight: bold;
      }

      tr:nth-child(even) {
        background-color: #fafafa;
      }

      .event-id {
        color: red;
        font-weight: bold;
      }

      .c-blue {
        color: blue;
        font-weight: bold;
      }

      a {
        color: #333;
        text-decoration: none;
        padding: 4px 8px;
        background-color: #f0f0f0;
        border-radius: 4px;
        margin-right: 8px;
      }

      a:hover {
        background-color: #e0e0e0;
      }


      .section {
        margin-bottom: 40px;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <script>
      const port = 4000;
      const data = {
        events: [
          {
            id: "80",
            title: "sgate 클라우드 서비스 바우처",
            type: "",
            contentCode: "80",
          },
        ],
        popups: [
          {
            type: "STG/운영",
          },
        ],
        popups: [
          {
            title: "공통 팝업 - 모바일 기기 / 전시관리 / 팝업관리 / 상세보기",
            desc: "모바일 기기 공통 팝업",
            path: "popup/common",
          },
        ],
        deviceManagement: [
          {
            title: "단말관리 - 공통",
            desc: "단말관리 공통",
            path: "deviceManagement",
          },
        ],
      };

      // 테이블 생성 함수
      function createTable(title, data, columns, renderRow) {
        return `
        <div class="section">
          <h1>${title}</h1>
          <table>
            <colgroup>
              <col style="width: 40%;">
              <col style="width: 20%;">
              <col style="width: 20%;">
            </colgroup>
            <thead>
              <tr>
                ${columns.map((col) => `<th>${col}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${data.map((item) => renderRow(item)).join("")}
            </tbody>
          </table>
        </div>
      `;
      }

      // 이벤트 테이블 렌더링
      const eventsTable = createTable(
        "이벤트 링크",
        data.events,
        ["이벤트 ID (localhost)", "비고", "링크"],
        (event) => `
        <tr>
          <td>
            <span class="event-id">${event.id}</span>
            ${event.contentCode ? `<span class="c-blue">(컨텐츠코드 ${event.contentCode})</span>` : ""}
            - ${event.title}
          </td>
          <td>${event.type}</td>
          <td>
            <a href="http://localhost:${port}/event/${event.id}/" target="_blank">반응형</a>
          </td>
        </tr>
      `
      );

      // 전체 렌더링
      document.getElementById("app").innerHTML = eventsTable ;
    </script>
  </body>
</html>
